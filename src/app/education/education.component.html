<mat-card *ngFor="let item of educData">
	<div id="app-education">
		<h3 class="card-header">{{item.title}}</h3>
		<span class="dates">{{item.startDate}} - {{item.endDate}}</span>
		<mat-card-content>
			<h4 class="card-title">{{item.where}}</h4>
			<p class="card-text">
				{{item.desc}}
			</p>
		</mat-card-content>
	</div>
</mat-card>
